<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mustang Game Tracker</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f4f0;--surface:#fff;--surface2:#f0efe9;--border:#e2e0d8;--border2:#ccc9bd;
  --text:#1a1916;--text2:#6b6960;--text3:#9b9a93;
  --green:#1e6b2a;--green-bg:#eaf4eb;--green-b:#b8debb;
  --amber:#7a5200;--amber-bg:#fdf3d7;--amber-b:#f0d08a;
  --red:#8b1a1a;--red-bg:#fdeaea;--red-b:#f0aaaa;
  --blue:#1a4a7a;--blue-bg:#e8f0fb;--blue-b:#a8c4ea;
  --gray-bg:#f4f3ef;--gray-b:#d8d6ce;
  --mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif;
}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh}
.shell{max-width:800px;margin:0 auto;padding:1.75rem 1.25rem 4rem}
.top{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:1.25rem}
.top h1{font-size:21px;font-weight:600;letter-spacing:-.02em}
.top .ts{font-size:11px;color:var(--text3);font-family:var(--mono)}
.sw{background:var(--surface);border:1px solid var(--border);border-radius:11px;margin-bottom:1.1rem;overflow:hidden}
.sh{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer;user-select:none}
.sh-title{font-size:13px;font-weight:600}
.sh-tog{font-size:11px;color:var(--text3);font-family:var(--mono)}
.st{width:100%;border-collapse:collapse;font-size:12px}
.st th{font-size:10px;font-family:var(--mono);font-weight:500;color:var(--text3);text-align:right;padding:6px 12px;border-bottom:1px solid var(--border);background:var(--surface2)}
.st th:first-child{text-align:left}
.st td{padding:8px 12px;border-bottom:1px solid var(--border);text-align:right;color:var(--text)}
.st td:first-child{text-align:left;font-weight:500}
.st tr:last-child td{border-bottom:none}
.st tr:hover td{background:var(--surface2)}
.rank{font-family:var(--mono);font-size:10px;color:var(--text3);margin-right:6px}
.rec{font-family:var(--mono);font-weight:600}
.pct-col{font-family:var(--mono);font-size:11px}
.rs-ra{font-family:var(--mono);font-size:11px;color:var(--text2)}
.gb-col{font-family:var(--mono);font-size:11px;color:var(--text3)}
.controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:1rem}
select{font-family:var(--sans);font-size:13px;padding:6px 10px;border-radius:7px;border:1px solid var(--border2);background:var(--surface);color:var(--text);appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%239b9a93' stroke-width='1.5' fill='none' stroke-linecap='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 9px center;padding-right:26px;min-width:165px;cursor:pointer}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1rem}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:11px 13px}
.stat-lbl{font-size:10px;color:var(--text3);font-family:var(--mono);margin-bottom:3px;text-transform:uppercase;letter-spacing:.04em}
.stat-val{font-size:22px;font-weight:600;letter-spacing:-.02em}
.tabs{display:flex;gap:5px;margin-bottom:.9rem;flex-wrap:wrap}
.tab{font-family:var(--sans);font-size:12px;font-weight:500;padding:5px 13px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;transition:all .12s}
.tab:hover{border-color:var(--text3)}
.tab.on{background:var(--text);color:var(--bg);border-color:var(--text)}
.dg{font-size:11px;font-weight:600;font-family:var(--mono);color:var(--text3);letter-spacing:.06em;text-transform:uppercase;padding:10px 2px 4px;margin-top:.25rem}
.card{background:var(--surface);border:1px solid var(--border);border-radius:11px;margin-bottom:7px;overflow:hidden;transition:border-color .12s}
.card:hover{border-color:var(--border2)}
.ch{display:flex;align-items:center;gap:9px;padding:12px 14px;cursor:pointer;user-select:none}
.gn{width:27px;height:27px;border-radius:50%;background:var(--text);color:var(--bg);font-size:11px;font-weight:600;font-family:var(--mono);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.gi{flex:1;min-width:0}
.gm{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gw{font-size:11px;color:var(--text3);font-family:var(--mono);margin-top:1px}
.gme{display:flex;align-items:center;gap:6px;flex-shrink:0}
.dots{display:flex;gap:3px;align-items:center}
.dot{width:7px;height:7px;border-radius:50%}
.df{background:var(--green)}.dp{background:var(--border2)}.du{background:var(--border)}
.sp{font-size:10px;font-weight:600;padding:3px 9px;border-radius:20px;letter-spacing:.02em;white-space:nowrap}
.sb{background:var(--green-bg);color:var(--green);border:1px solid var(--green-b)}
.so{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-b)}
.sn{background:var(--gray-bg);color:var(--text3);border:1px solid var(--gray-b)}
.su{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-b)}
.cv{color:var(--text3);font-size:9px;transition:transform .18s;flex-shrink:0}
.cv.open{transform:rotate(180deg)}
.cb{border-top:1px solid var(--border);padding:13px 14px}
.sl{font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--text3);margin-bottom:8px;font-family:var(--mono)}
.sr{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.sc{display:flex;align-items:center;gap:7px;background:var(--surface2);border-radius:7px;padding:6px 11px}
.scn{font-size:12px;color:var(--text2)}
.scv{font-size:20px;font-weight:600;letter-spacing:-.02em;font-family:var(--mono)}
.sc.win .scv{color:var(--blue)}
.sat{font-size:12px;color:var(--text3)}
.ns{font-size:12px;color:var(--text3);font-style:italic;margin-bottom:14px}
.pt{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:14px}
.pt th{font-size:10px;font-family:var(--mono);font-weight:500;color:var(--text3);text-align:left;padding:3px 0 5px;border-bottom:1px solid var(--border)}
.pt th:not(:first-child){text-align:right}
.pt td{padding:6px 0;border-bottom:1px solid var(--border);vertical-align:middle;color:var(--text)}
.pt td:not(:first-child){text-align:right}
.pt tr:last-child td{border-bottom:none}
.tb{display:inline-block;font-size:10px;font-family:var(--mono);padding:1px 5px;border-radius:3px;margin-right:4px}
.ta{background:var(--surface2);color:var(--text2)}
.th2{background:var(--blue-bg);color:var(--blue)}
.pw{font-weight:600;font-family:var(--mono)}
.pb{display:inline-flex;align-items:center;gap:5px}
.pbb{width:44px;height:4px;background:var(--border);border-radius:2px;overflow:hidden;flex-shrink:0}
.pbf{height:100%;border-radius:2px}
.rp{font-size:10px;font-weight:600;font-family:var(--mono);padding:3px 8px;border-radius:20px;white-space:nowrap}
.rok{background:var(--green-bg);color:var(--green);border:1px solid var(--green-b)}
.rno{background:var(--red-bg);color:var(--red);border:1px solid var(--red-b)}
.ar{display:flex;gap:7px}
.ab{flex:1;border-radius:7px;padding:8px 10px}
.af2{background:var(--green-bg);border:1px solid var(--green-b)}
.am{background:var(--amber-bg);border:1px solid var(--amber-b)}
.au2{background:var(--gray-bg);border:1px solid var(--gray-b)}
.at2{font-weight:500;font-size:12px;color:var(--text);margin-bottom:2px}
.aff{font-family:var(--mono);font-size:10px;color:var(--text3);word-break:break-all}
.nt{font-size:11px;color:var(--amber);background:var(--amber-bg);border:1px solid var(--amber-b);border-radius:6px;padding:6px 9px;margin-bottom:12px;font-family:var(--mono)}
.empty{text-align:center;padding:2rem;color:var(--text3);font-size:13px;background:var(--surface);border:1px solid var(--border);border-radius:11px}
</style>
</head>
<body>
<div class="shell">
<div class="top">
  <h1>Mustang Game Tracker</h1>
  <span class="ts">2026 season · updated Apr 24</span>
</div>
<div class="sw">
  <div class="sh" onclick="toggleStandings()">
    <span class="sh-title">Standings</span>
    <span class="sh-tog" id="stog">hide ▲</span>
  </div>
  <div id="standingsBody"><table class="st" id="standingsTbl"></table></div>
</div>
<div class="controls">
  <select id="teamSel" onchange="render()">
    <option value="">All teams</option>
    <option>Mets</option><option>Blue Jays</option><option>Phillies</option><option>Pirates</option>
    <option>Red Sox</option><option>Brewers</option><option>Reds</option><option>Giants</option>
  </select>
</div>
<div class="stats" id="statsRow"></div>
<div class="tabs">
  <button class="tab on" onclick="setTab('all',this)">All</button>
  <button class="tab" onclick="setTab('missing',this)">Missing</button>
  <button class="tab" onclick="setTab('upcoming',this)">Upcoming</button>
</div>
<div id="gameList"></div>
</div>
<script>
const TODAY=new Date(2026,3,24);
function d(m,day){return new Date(2026,m-1,day);}
const MN=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DN=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
function fmtD(dt){return `${DN[dt.getDay()]}, ${MN[dt.getMonth()]} ${dt.getDate()}`;}
function isPast(dt){return dt<TODAY;}
function restDays(p){return p<=20?0:p<=35?1:p<=50?2:p<=65?3:4;}
function pitchColor(p){return p<=35?'#2d8a3e':p<=50?'#b07800':p<=65?'#c05000':'#8b1a1a';}
function nextGameDate(team){
  const up=SCHED.filter(g=>(g.home===team||g.away===team)&&g.dt>TODAY);
  return up.length?up[0].dt:null;
}
function isEligible(gd,pitches,targetDate){
  if(!targetDate) return true;
  const rd=restDays(pitches);
  const el=new Date(gd); el.setDate(el.getDate()+rd+1);
  return el<=targetDate;
}

function buildStandings(){
  const s={};
  ['Mets','Blue Jays','Phillies','Pirates','Red Sox','Brewers','Reds','Giants'].forEach(t=>s[t]={w:0,l:0,t:0,rs:0,ra:0});
  for(const [gid,a] of Object.entries(AFF)){
    if(a.hs==null||a.as==null) continue;
    const g=SCHED.find(x=>x.id==gid); if(!g) continue;
    s[g.home].rs+=a.hs; s[g.home].ra+=a.as;
    s[g.away].rs+=a.as; s[g.away].ra+=a.hs;
    if(a.hs>a.as){s[g.home].w++;s[g.away].l++;}
    else if(a.as>a.hs){s[g.away].w++;s[g.home].l++;}
    else{s[g.home].t++;s[g.away].t++;}
  }
  return Object.entries(s).map(([team,st])=>{
    const gp=st.w+st.l+st.t;
    return{team,...st,gp,pct:gp?st.w/gp:0};
  }).sort((a,b)=>b.pct-a.pct||b.w-a.w||a.l-b.l);
}
function renderStandings(){
  const rows=buildStandings();
  const lw=rows[0]?.w||0,ll=rows[0]?.l||0;
  document.getElementById('standingsTbl').innerHTML=
    `<thead><tr><th style="text-align:left">Team</th><th>W</th><th>L</th><th>T</th><th>GP</th><th>RS</th><th>RA</th><th>PCT</th><th>GB</th></tr></thead><tbody>`+
    rows.map((r,i)=>{
      const gb=i===0?'—':((lw-r.w+(ll-r.l))/2).toFixed(1);
      return `<tr><td><span class="rank">${i+1}</span>${r.team}</td><td class="rec">${r.w}</td><td class="rec">${r.l}</td><td class="rec">${r.t}</td><td class="rs-ra">${r.gp}</td><td class="rs-ra">${r.rs}</td><td class="rs-ra">${r.ra}</td><td class="pct-col">${r.gp?r.pct.toFixed(3):'—'}</td><td class="gb-col">${gb}</td></tr>`;
    }).join('')+'</tbody>';
}
let standingsOpen=true;
function toggleStandings(){
  standingsOpen=!standingsOpen;
  document.getElementById('standingsBody').style.display=standingsOpen?'':'none';
  document.getElementById('stog').textContent=standingsOpen?'hide ▲':'show ▼';
}

let tab='all', expanded=new Set();
function setTab(t,el){tab=t;document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));el.classList.add('on');render();}
function toggle(id){expanded.has(id)?expanded.delete(id):expanded.add(id);render();}

function gameStatus(g){
  const a=AFF[g.id];
  if(!isPast(g.dt)) return 'upcoming';
  if(!a) return 'missing';
  if([g.home,g.away].every(t=>Object.keys(a.teams).includes(t))) return 'both';
  return 'one';
}

function render(){
  const tf=document.getElementById('teamSel').value;
  function mf(g){return !tf||(g.home===tf||g.away===tf);}
  function mt(g){
    const s=gameStatus(g);
    if(tab==='all') return true;
    if(tab==='missing') return s==='missing'||s==='one';
    if(tab==='upcoming') return s==='upcoming';
    return true;
  }
  const vis=SCHED.filter(g=>mf(g)&&mt(g));
  const all=SCHED.filter(mf);
  const past=all.filter(g=>isPast(g.dt));
  const both=past.filter(g=>gameStatus(g)==='both').length;
  const missing=past.filter(g=>gameStatus(g)==='missing'||gameStatus(g)==='one').length;
  const upcoming=all.filter(g=>gameStatus(g)==='upcoming').length;
  document.getElementById('statsRow').innerHTML=`
    <div class="stat"><div class="stat-lbl">Total</div><div class="stat-val">${all.length}</div></div>
    <div class="stat"><div class="stat-lbl">Both filed</div><div class="stat-val">${both}</div></div>
    <div class="stat"><div class="stat-lbl">Missing</div><div class="stat-val">${missing}</div></div>
    <div class="stat"><div class="stat-lbl">Upcoming</div><div class="stat-val">${upcoming}</div></div>
  `;
  if(!vis.length){document.getElementById('gameList').innerHTML='<div class="empty">No games match this filter.</div>';return;}
  const groups=[];let ld=null;
  for(const g of vis){const dk=g.dt.toDateString();if(dk!==ld){groups.push({date:g.dt,games:[]});ld=dk;}groups[groups.length-1].games.push(g);}
  document.getElementById('gameList').innerHTML=groups.map(({date,games})=>
    `<div class="dg">${fmtD(date)}</div>`+games.map(renderCard).join('')
  ).join('');
}

function renderCard(g){
  const a=AFF[g.id];const s=gameStatus(g);const open=expanded.has(g.id);const ip=isPast(g.dt);
  const pill=s==='both'?'<span class="sp sb">Both filed</span>':s==='one'?'<span class="sp so">Partial</span>':s==='missing'?'<span class="sp sn">Missing</span>':'<span class="sp su">Upcoming</span>';
  const hf=a&&a.teams[g.home],af=a&&a.teams[g.away];
  const dh=ip?(hf?'df':'dp'):'du',da=ip?(af?'df':'dp'):'du';
  let body='';
  if(open){
    let score='';
    if(a&&a.hs!=null&&a.as!=null){
      const hw=a.hs>a.as,aw=a.as>a.hs;
      score=`<div class="sr"><div class="sc ${aw?'win':''}"><span class="scn">${g.away}</span><span class="scv">${a.as}</span></div><span class="sat">@</span><div class="sc ${hw?'win':''}"><span class="scn">${g.home}</span><span class="scv">${a.hs}</span></div></div>`;
    } else {
      score=`<div class="ns">${ip?'Score not fully recorded':'Game not yet played'}</div>`;
    }
    const note=a&&a.note?`<div class="nt">&#9888; ${a.note}</div>`:'';
    const allP=a?Object.entries(a.teams).flatMap(([team,td])=>td.pitchers.map(p=>({...p,team}))).filter(p=>p.p!=null):[];
    let ptrs='';
    if(allP.length){
      const rows=allP.map(p=>{
        const clr=pitchColor(p.p),pct=Math.min(100,Math.round(p.p/75*100));
        const ng=nextGameDate(p.team),elig=isEligible(p.gd,p.p,ng);
        let rp='';
        if(!ng||elig){rp=`<span class="rp rok">available</span>`;}
        else{const el=new Date(p.gd);el.setDate(el.getDate()+restDays(p.p)+1);rp=`<span class="rp rno">out until ${MN[el.getMonth()]} ${el.getDate()}</span>`;}
        return `<tr><td><span class="tb ${p.side==='away'?'ta':'th2'}">${p.team}</span>${p.name}</td><td><div class="pb"><span class="pw" style="color:${clr}">${p.p}</span><div class="pbb"><div class="pbf" style="width:${pct}%;background:${clr}"></div></div></div></td><td>${rp}</td></tr>`;
      }).join('');
      ptrs=`<div class="sl">Pitchers</div><table class="pt"><thead><tr><th>Player</th><th>Pitches</th><th>Next game eligibility</th></tr></thead><tbody>${rows}</tbody></table>`;
    } else if(ip){ptrs='<div class="ns" style="margin-bottom:14px">No pitcher data recorded</div>';}
    function abox(team,lbl){
      const td=a&&a.teams[team];
      if(!ip) return `<div class="ab au2"><div class="at2">${team} (${lbl})</div><div class="aff">not yet played</div></div>`;
      if(td) return `<div class="ab af2"><div class="at2">${team} (${lbl})</div><div class="aff">${td.file}</div></div>`;
      return `<div class="ab am"><div class="at2">${team} (${lbl})</div><div class="aff">not filed</div></div>`;
    }
    body=`<div class="cb"><div style="margin-bottom:12px"><div class="sl">Final score</div>${score}</div>${note}${ptrs?`<div style="margin-bottom:14px">${ptrs}</div>`:''}<div><div class="sl">Affidavit status</div><div class="ar">${abox(g.away,'away')}${abox(g.home,'home')}</div></div></div>`;
  }
  return `<div class="card"><div class="ch" onclick="toggle(${g.id})"><div class="gn">${g.id}</div><div class="gi"><div class="gm">${g.away} @ ${g.home}</div><div class="gw">${g.time} · ${g.field}</div></div><div class="gme"><div class="dots"><div class="dot ${da}" title="${g.away}"></div><div class="dot ${dh}" title="${g.home}"></div></div>${pill}<span class="cv ${open?'open':''}">&#9660;</span></div></div>${body}</div>`;
}

renderStandings();
render();
</script>
</body>
</html>
